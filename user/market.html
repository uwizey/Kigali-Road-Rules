 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Subscriptions</title>
<link rel="icon" href="../assets/logo.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link rel="stylesheet" href="../css/user/market.css">
</head>
<body>

<!-- ===== Header ===== -->
<header class="header">
  <div class="header-inner">
    <button class="back-btn" type="button" onclick="history.back()">
      <i class="fa-solid fa-arrow-left"></i> Back
    </button>
    
    <div class="avatar">JD</div>
  </div>
</header>

<!-- ===== Main ===== -->
<main class="main">
  <div class="page-head">
    <span class="tag">Account</span>
    <h1>My Subscriptions</h1>
    <p class="lead">Manage your plan, upgrade options, and request history.</p>
  </div>

  <div class="tabs-wrap">
    <div class="tabs" role="tablist">
      <button class="tab active" data-tab="current"><i class="fa-regular fa-credit-card"></i> Current Subscription</button>
      <button class="tab" data-tab="upgrade"><i class="fa-solid fa-bolt"></i> Upgrade or Renew</button>
      <button class="tab" data-tab="history"><i class="fa-regular fa-clock"></i> Request History</button>
    </div>
  </div>

  <!-- ===== Current ===== -->
  <section class="panel" id="panel-current">
    <div id="pending-alert-box"></div>
    <div class="current-grid">
      <div id="active-sub-container">
        <div class="spinner-wrap"><div class="spinner"></div> Loading subscription…</div>
      </div>
      <aside class="card features-card" id="features-card" hidden>
        <h3>Plan Features</h3>
        <ul id="features-list"></ul>
      </aside>
    </div>
  </section>

  <!-- ===== Upgrade ===== -->
  <section class="panel" id="panel-upgrade" hidden>
    <div class="plans-grid" id="plans-container">
      <div class="spinner-wrap" style="grid-column:1/-1"><div class="spinner"></div> Loading plans…</div>
    </div>
  </section>

  <!-- ===== History ===== -->
  <section class="panel" id="panel-history" hidden>
    <div class="table-card">
      <div class="table-head">
        <div>
          <h3>Request History</h3>
          <p>All your subscription requests in one place.</p>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Reference</th><th>Date</th><th>Plan</th><th>Status</th><th></th>
            </tr>
          </thead>
          <tbody id="history-list">
            <tr><td colspan="5"><div class="spinner-wrap"><div class="spinner"></div> Loading history…</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>
</main>
<script type="module" src="../js/user/market.js"></script>
</body>
</html>
