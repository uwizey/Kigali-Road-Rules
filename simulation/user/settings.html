 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Account Settings</title>
<link rel="icon" href="../assets/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<style>
  /* ===== Design tokens (mirrors Subscriptions page) ===== */
  :root {
    --primary: #0097b2;
    --primary-dark: #007a91;
    --primary-fg: #ffffff;
    --bg: #ffffff;
    --off-white: #f6f9fa;
    --bg-teal: #eaf5f7;
    --foreground: #0f172a;
    --muted: #6b7785;
    --muted-bg: #eef1f4;
    --border: #e3e8ec;
    --accent: #e8f4f6;
    --card: #ffffff;
    --success: #16a34a;
    --success-bg: #dcfce7;
    --danger: #dc2626;
    --danger-bg: #fee2e2;
    --warning: #b45309;
    --warning-bg: #fef3c7;
    --shadow-soft: 0 1px 2px rgba(15,23,42,.04), 0 8px 24px -12px rgba(15,23,42,.08);
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    background: var(--off-white);
    color: var(--foreground);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  a { text-decoration: none; color: inherit; }

  /* ===== Header (identical to subscriptions) ===== */
  .header {
    position: sticky; top: 0; z-index: 10;
    height: 66px; background: var(--bg);
    border-bottom: 1px solid rgba(0,151,178,.7);
  }
  .header-inner {
    max-width: 1060px; margin: 0 auto; height: 100%;
    padding: 0 24px; display: flex; align-items: center; gap: 24px;
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: var(--muted); transition: color .15s;
  }
  .back-btn:hover { color: var(--primary); }
  .brand { display: flex; align-items: center; gap: 10px; margin-left: 4px; }
  .brand-logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--primary); color: var(--primary-fg);
    display: grid; place-items: center;
  }
  .brand-title { display: flex; flex-direction: column; line-height: 1.15; }
  .brand-title strong { font-size: 13px; font-weight: 800; letter-spacing: -.01em; }
  .brand-title small { font-size: 8.5px; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; color: var(--primary); }
  .avatar {
    margin-left: auto; width: 36px; height: 36px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--bg);
    display: grid; place-items: center; font-size: 13px; font-weight: 600; color: var(--muted);
  }

  /* ===== Layout ===== */
  .main { max-width: 1060px; margin: 0 auto; padding: 40px 24px; }
  .page-head { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; margin-bottom: 40px; }
  .tag {
    display: inline-block; font-size: 11px; font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase; color: var(--primary);
    background: var(--accent); padding: 4px 14px; border-radius: 9999px;
  }
  h1 { font-size: clamp(21px, 4vw, 32px); font-weight: 700; letter-spacing: -.02em; margin: 0; }
  .lead { color: var(--muted); max-width: 28rem; margin: 0; font-size: 14px; }

  /* ===== Settings grid ===== */
  .settings-grid { display: grid; gap: 20px; grid-template-columns: 1fr; }
  @media (min-width: 900px) { .settings-grid { grid-template-columns: 1fr 1fr; } }

  .card {
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--card);
    box-shadow: var(--shadow-soft);
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  .card:focus-within { border-color: var(--primary); box-shadow: 0 10px 30px -12px rgba(0,151,178,.25); }

  .card-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(180deg, rgba(232,244,246,.45), transparent);
  }
  .card-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--accent); color: var(--primary);
    display: grid; place-items: center; font-size: 15px; flex-shrink: 0;
  }
  .card-title { font-size: 15px; font-weight: 700; margin: 0; }
  .card-subtitle {
    font-size: 12px; color: var(--muted); margin: 2px 0 0;
  }

  .card-body {
    padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
  }

  /* ===== Form ===== */
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  label {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted);
  }
  .input-wrap { position: relative; }
  input {
    font-family: inherit;
    font-size: 14px;
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--off-white);
    color: var(--foreground);
    outline: none;
    transition: border .15s, box-shadow .15s, background .15s;
    -webkit-appearance: none;
    appearance: none;
  }
  input::placeholder { color: #9aa6b2; }
  input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(0,151,178,.15);
    background: var(--bg);
  }
  input.err { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(220,38,38,.12); }
  input.ok  { border-color: var(--success); }
  .input-wrap input { padding-right: 44px; }

  .toggle-pw {
    position: absolute;
    right: 6px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    padding: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 6px;
    transition: color .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .toggle-pw:hover { color: var(--primary); background: var(--accent); }

  /* ===== Field feedback ===== */
  .field-msg {
    font-size: 11px; min-height: 14px; color: var(--muted);
  }
  .field-msg.err { color: var(--danger); }
  .field-msg.ok  { color: var(--success); }

  .strength-row { display: flex; gap: 4px; margin-top: 4px; }
  .seg {
    height: 4px; flex: 1; border-radius: 2px;
    background: var(--border);
    transition: background .22s;
  }
  .seg.weak   { background: var(--danger); }
  .seg.fair   { background: #e0952a; }
  .seg.good   { background: var(--primary); }
  .seg.strong { background: var(--success); }

  /* ===== Button ===== */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 0 16px; height: 40px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    transition: all .15s;
    width: 100%;
  }
  .btn-primary { background: var(--primary); color: var(--primary-fg); }
  .btn-primary:hover:not(:disabled) { background: var(--primary-dark); }
  .btn:disabled { background: var(--muted-bg); color: var(--muted); cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(.99); }
  .btn.loading { pointer-events: none; }
  .btn.loading .btn-label { display: none; }
  .btn .spinner {
    display: none; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.35);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  .btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    padding: 13px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 10px 30px -10px rgba(15,23,42,.25);
    opacity: 0;
    transform: translateY(20px);
    transition: opacity .25s, transform .25s;
    z-index: 9999;
    max-width: 340px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success); }
  .toast.error   { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger); }

  @media (max-width: 600px) {
    .toast { left: 16px; right: 16px; max-width: none; }
  }
</style>
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="header">
    <div class="header-inner">
      <!-- <a href="#" class="back-btn" id="backBtn">
        <i class="fa-solid fa-arrow-left"></i> Back
      </a> -->
      <button class="back-btn" type="button" onclick="history.back()">
      <i class="fa-solid fa-arrow-left"></i> Back
    </button>
      
      <!-- <div class="avatar">JD</div> -->
    </div>
  </header>

  <!-- ===== Main ===== -->
  <main class="main">
    <div class="page-head">
      <span class="tag">Account</span>
      <h1>Account Settings</h1>
      <p class="lead">Update your email address and password. Changes are applied immediately.</p>
    </div>

    <section class="settings-grid">

      <!-- ===== Email card ===== -->
      <div class="card">
        <div class="card-header">
          <div class="card-icon"><i class="fa-solid fa-envelope"></i></div>
          <div>
            <h2 class="card-title">Email Address</h2>
            <p class="card-subtitle">Enter your new email and confirm it</p>
          </div>
        </div>

        <form id="emailForm" class="card-body" autocomplete="off" novalidate>
          <div class="form-group">
            <label for="newEmail">New Email</label>
            <input type="email" id="newEmail" name="newEmail" placeholder="you@email.com" autocomplete="off" />
            <span class="field-msg" id="newEmailMsg"></span>
          </div>

          <div class="form-group">
            <label for="confirmEmail">Confirm Email</label>
            <input type="email" id="confirmEmail" name="confirmEmail" placeholder="Repeat new email" autocomplete="off" />
            <span class="field-msg" id="confirmEmailMsg"></span>
          </div>

          <div class="form-group">
            <label for="emailCurrentPw">Current Password</label>
            <div class="input-wrap">
              <input type="password" id="emailCurrentPw" name="emailCurrentPw" placeholder="Enter your current password" autocomplete="current-password" />
              <button type="button" class="toggle-pw" data-target="emailCurrentPw" aria-label="Show password">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
            <span class="field-msg" id="emailCurrentPwMsg"></span>
          </div>

          <button type="submit" id="updateEmailBtn" class="btn btn-primary">
            <span class="btn-label"><i class="fa-solid fa-check"></i> Update Email</span>
            <span class="spinner"></span>
          </button>
        </form>
      </div>

      <!-- ===== Password card ===== -->
      <div class="card">
        <div class="card-header">
          <div class="card-icon"><i class="fa-solid fa-lock"></i></div>
          <div>
            <h2 class="card-title">Password</h2>
            <p class="card-subtitle">Enter current password, then choose a new one</p>
          </div>
        </div>

        <form id="passwordForm" class="card-body" autocomplete="off" novalidate>
          <div class="form-group">
            <label for="currentPw">Current Password</label>
            <div class="input-wrap">
              <input type="password" id="currentPw" name="currentPw" placeholder="Enter your current password" autocomplete="current-password" />
              <button type="button" class="toggle-pw" data-target="currentPw" aria-label="Show password">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
            <span class="field-msg" id="currentPwMsg"></span>
          </div>

          <div class="form-group">
            <label for="newPw">New Password</label>
            <div class="input-wrap">
              <input type="password" id="newPw" name="newPw" placeholder="Choose a strong password" autocomplete="new-password" />
              <button type="button" class="toggle-pw" data-target="newPw" aria-label="Show password">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
            <div class="strength-row" id="strengthRow">
              <span class="seg"></span>
              <span class="seg"></span>
              <span class="seg"></span>
              <span class="seg"></span>
            </div>
            <span class="field-msg" id="newPwMsg"></span>
          </div>

          <div class="form-group">
            <label for="confirmPw">Confirm New Password</label>
            <div class="input-wrap">
              <input type="password" id="confirmPw" name="confirmPw" placeholder="Repeat new password" autocomplete="new-password" />
              <button type="button" class="toggle-pw" data-target="confirmPw" aria-label="Show password">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
            <span class="field-msg" id="confirmPwMsg"></span>
          </div>

          <button type="submit" id="updatePasswordBtn" class="btn btn-primary">
            <span class="btn-label"><i class="fa-solid fa-shield-halved"></i> Update Password</span>
            <span class="spinner"></span>
          </button>
        </form>
      </div>

    </section>
  </main>

  <!-- Toast slot for your existing JS -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Tiny UX-only helper: show/hide password toggle.
       All data fetching stays in your separate settings JS. -->
  <script>
    document.querySelectorAll('.toggle-pw').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        if (!input) return;
        const isPw = input.type === 'password';
        input.type = isPw ? 'text' : 'password';
        btn.querySelector('i').className = isPw ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
      });
    });
  </script>
</body>
</html>
