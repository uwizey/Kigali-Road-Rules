<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kigali RoadRules | Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="../assets/logo.png" type="image/png" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>

  

  <div class="auth-container">
     
    <a class="heading-line" href="../index.html">Kigali RoadRules</a>
    

    <div id="message-box" role="alert" aria-live="polite"></div>

    <div class="auth-tabs">
      <button id="login-tab"  class="tab active">Login</button>
      <button id="signup-tab" class="tab">Sign Up</button>
    </div>

    <form class="auth-form" id="auth-form" novalidate>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required />
          <button type="button" class="toggle-password" onclick="togglePass('password', this)" aria-label="Show password">
            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="forgot-link" id="forgot-password-link">
        <a href="#">Forgot password?</a>
      </div>

      <div class="form-group hidden" id="confirm-password-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" placeholder="Confirm password" autocomplete="new-password" />
          <button type="button" class="toggle-password" onclick="togglePass('confirmPassword', this)" aria-label="Show confirm password">
            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="primary-button" id="submit-btn">Login</button>

    </form>
  </div>

  <script type="module" src="../js/user/main.js"></script>
</body>
</html>
