<!DOCTYPE html>
<html>
<head>
  <title>Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; }
    .container { width:90%; margin:auto; }
    .controls { margin:20px 0; display:flex; gap:10px; }
    button, input { padding:8px 12px; border:none; border-radius:6px; }
    button { background:#00bcd4; color:white; cursor:pointer; }
    canvas { background:#111827; padding:10px; border-radius:10px; }
  </style>
</head>
<body>

<div class="container">

  <h2>📊 Analytics Dashboard</h2>

  <!-- Filters -->
  <div class="controls">
    <button onclick="applyRange(7)">Last 7 Days</button>
    <button onclick="applyRange(30)">Last 30 Days</button>

    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button onclick="applyCustom()">Apply</button>
  </div>

  <!-- Charts -->
  <canvas id="eventsChart" height="100"></canvas>
  <br>
  <canvas id="topicsChart" height="100"></canvas>
  <br>
  <canvas id="devicesChart" height="100"></canvas>

</div>

<script>
/* ==== YOUR DATASET (shortened for demo, replace with full D) ==== */
const D = window.D || {
  labels: ['Apr 1','Apr 2','Apr 3','Apr 4','Apr 5','Apr 6','Apr 7','Apr 8','Apr 9','Apr 10','Apr 11','Apr 12'],
  events:{
    login:[90,100,110,95,105,120,130,115,125,135,140,145],
    quiz:[70,80,85,75,82,90,95,88,92,100,105,108],
    topicQuiz:[45,50,55,48,52,60,65,58,62,70,75,80]
  },
  topics:{
    algebra:[25,28,30,27,29,32,35,33,34,36,38,40],
    physics:[20,22,25,21,23,26,28,27,29,30,32,35],
    cs:[30,35,38,34,36,40,42,39,41,45,48,50]
  },
  devices:{
    mobile:[50,55,58,52,56,60,65,62,64,68,70,72],
    desktop:[25,28,30,27,29,32,35,33,34,36,38,40],
    tablet:[8,9,10,8,9,10,12,11,11,12,13,14]
  }
};

/* ==== STATE ==== */
let startIndex = 0;
let endIndex = D.labels.length;

/* ==== FILTER FUNCTIONS ==== */
function applyRange(days) {
  endIndex = D.labels.length;
  startIndex = Math.max(0, endIndex - days);
  updateCharts();
}

function applyCustom() {
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;

  const labels = D.labels;
  startIndex = labels.findIndex(l => l.includes(start.split('-')[2]));
  endIndex = labels.findIndex(l => l.includes(end.split('-')[2])) + 1;

  if (startIndex === -1 || endIndex === 0) return alert("Invalid range");
  updateCharts();
}

/* ==== SLICE DATA ==== */
function slice(arr){ return arr.slice(startIndex, endIndex); }
function sliceLabels(){ return D.labels.slice(startIndex, endIndex); }

/* ==== CHARTS ==== */
let eventsChart, topicsChart, devicesChart;

function buildCharts() {

  eventsChart = new Chart(document.getElementById('eventsChart'), {
    type:'line',
    data:{
      labels:sliceLabels(),
      datasets:[
        {label:'Login', data:slice(D.events.login), borderWidth:2},
        {label:'Quiz', data:slice(D.events.quiz), borderWidth:2},
        {label:'Topic Quiz', data:slice(D.events.topicQuiz), borderWidth:2}
      ]
    },
    options:{responsive:true}
  });

  topicsChart = new Chart(document.getElementById('topicsChart'), {
    type:'line',
    data:{
      labels:sliceLabels(),
      datasets:[
        {label:'Algebra', data:slice(D.topics.algebra)},
        {label:'Physics', data:slice(D.topics.physics)},
        {label:'CS', data:slice(D.topics.cs)}
      ]
    }
  });

  devicesChart = new Chart(document.getElementById('devicesChart'), {
    type:'bar',
    data:{
      labels:sliceLabels(),
      datasets:[
        {label:'Mobile', data:slice(D.devices.mobile)},
        {label:'Desktop', data:slice(D.devices.desktop)},
        {label:'Tablet', data:slice(D.devices.tablet)}
      ]
    },
    options:{responsive:true}
  });
}

/* ==== UPDATE ==== */
function updateCharts(){
  eventsChart.data.labels = sliceLabels();
  eventsChart.data.datasets[0].data = slice(D.events.login);
  eventsChart.data.datasets[1].data = slice(D.events.quiz);
  eventsChart.data.datasets[2].data = slice(D.events.topicQuiz);
  eventsChart.update();

  topicsChart.data.labels = sliceLabels();
  topicsChart.data.datasets[0].data = slice(D.topics.algebra);
  topicsChart.data.datasets[1].data = slice(D.topics.physics);
  topicsChart.data.datasets[2].data = slice(D.topics.cs);
  topicsChart.update();

  devicesChart.data.labels = sliceLabels();
  devicesChart.data.datasets[0].data = slice(D.devices.mobile);
  devicesChart.data.datasets[1].data = slice(D.devices.desktop);
  devicesChart.data.datasets[2].data = slice(D.devices.tablet);
  devicesChart.update();
}

/* INIT */
buildCharts();
</script>

</body>
</html>
