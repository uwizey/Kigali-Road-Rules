<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Account Settings</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --cyan: #00c8d4;
    --cyan-light: #e0fafb;
    --cyan-mid: #00a8b2;
    --cyan-dark: #007a82;
    --white: #ffffff;
    --off-white: #f5feff;
    --border: #cdf0f2;
    --text: #0d2e30;
    --text-muted: #5a8a8e;
    --danger: #e05555;
    --success: #2db87a;
    --shadow: 0 2px 16px rgba(0,200,212,0.10);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--off-white);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 16px;
  }

  /* ── Page ── */
  .page {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .page-header { margin-bottom: 4px; }
  .page-header h1 {
    font-size: clamp(1.3rem, 6vw, 1.7rem);
    font-weight: 800;
    line-height: 1.15;
  }
  .page-header h1 span { color: var(--cyan); }
  .page-header p {
    font-size: clamp(0.72rem, 3vw, 0.8rem);
    color: var(--text-muted);
    margin-top: 5px;
    font-family: 'DM Mono', monospace;
  }

  /* ── Card ── */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .card:focus-within {
    border-color: var(--cyan);
    box-shadow: 0 4px 24px rgba(0,200,212,0.13);
  }

  .card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .card-icon {
    width: 34px; height: 34px;
    background: var(--cyan-light);
    border-radius: 8px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .card-icon svg { width: 17px; height: 17px; stroke: var(--cyan-dark); fill: none; stroke-width: 2; }
  .card-title { font-size: clamp(0.85rem, 3vw, 0.92rem); font-weight: 700; }
  .card-subtitle {
    font-size: clamp(0.65rem, 2.5vw, 0.71rem);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }

  .card-body {
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ── Form ── */
  .form-group { display: flex; flex-direction: column; gap: 5px; }

  label {
    font-size: clamp(0.65rem, 2.5vw, 0.71rem);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-muted);
  }

  .input-wrap { position: relative; }

  input {
    font-family: 'DM Mono', monospace;
    /* 16px minimum prevents iOS auto-zoom on focus */
    font-size: 16px;
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--off-white);
    color: var(--text);
    outline: none;
    transition: border 0.18s, box-shadow 0.18s;
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(0,200,212,0.12);
    background: var(--white);
  }
  input.err { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(224,85,85,0.09); }
  input.ok  { border-color: var(--success); }

  .input-wrap input { padding-right: 46px; }

  .toggle-pw {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--text-muted);
    /* Large tap target for mobile */
    padding: 8px;
    display: flex; align-items: center;
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .toggle-pw:hover { color: var(--cyan-dark); }
  .toggle-pw svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }

  /* ── Feedback ── */
  .field-msg {
    font-size: clamp(0.65rem, 2.5vw, 0.69rem);
    font-family: 'DM Mono', monospace;
    min-height: 15px;
  }
  .field-msg.err { color: var(--danger); }
  .field-msg.ok  { color: var(--success); }

  .strength-row { display: flex; gap: 4px; margin-top: 2px; }
  .seg {
    height: 4px; flex: 1; border-radius: 2px;
    background: var(--border);
    transition: background 0.22s;
  }
  .seg.weak   { background: var(--danger); }
  .seg.fair   { background: #e0952a; }
  .seg.good   { background: var(--cyan); }
  .seg.strong { background: var(--success); }

  /* ── Button ── */
  .btn {
    font-family: 'Syne', sans-serif;
    font-size: clamp(0.76rem, 3vw, 0.82rem);
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    /* min 48px height for accessibility tap target */
    padding: 14px;
    border-radius: 8px; border: none;
    cursor: pointer;
    transition: all 0.18s;
    width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--cyan); color: var(--white);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn:hover:not(:disabled) {
    background: var(--cyan-mid);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(0,200,212,0.3);
  }
  .btn:active:not(:disabled) { transform: scale(0.98); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn.loading { pointer-events: none; }
  .btn.loading .btn-label { display: none; }
  .btn .spinner {
    display: none; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  .toast {
    position: fixed;
    /* Centered + full-width on mobile */
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(90px);
    width: calc(100% - 32px);
    max-width: 380px;
    padding: 13px 18px;
    border-radius: 10px;
    font-size: clamp(0.76rem, 3vw, 0.82rem);
    font-weight: 700;
    letter-spacing: 0.03em;
    text-align: center;
    box-shadow: 0 4px 18px rgba(0,0,0,0.15);
    opacity: 0;
    transition: transform 0.28s cubic-bezier(.34,1.56,.64,1), opacity 0.28s;
    z-index: 9999;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .toast.success { background: var(--text); color: var(--cyan); }
  .toast.error   { background: var(--danger); color: var(--white); }

  /* ══════════════════════════════════════════
     BREAKPOINTS
  ══════════════════════════════════════════ */

  /* Tiny phones < 360px */
  @media (max-width: 359px) {
    body { padding: 20px 12px; }
    .card-body { padding: 14px; gap: 12px; }
    .card-header { padding: 12px 14px; gap: 10px; }
    .card-subtitle { display: none; }
    input { font-size: 16px; padding: 11px 12px; }
  }

  /* Tablets >= 640px — two cards side by side */
  @media (min-width: 640px) {
    body { padding: 48px 28px; }

    .page { max-width: 860px; }

    .cards-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: start;
    }

    input { font-size: 0.88rem; }

    /* Toast: right-anchored on larger screens */
    .toast {
      left: auto;
      right: 24px;
      bottom: 24px;
      transform: translateX(0) translateY(90px);
      width: auto;
      max-width: 340px;
      text-align: left;
    }
    .toast.show { transform: translateX(0) translateY(0); }
  }

  /* Desktops >= 1024px */
  @media (min-width: 1024px) {
    body { padding: 64px 48px; }
    .page { max-width: 920px; }
    .card-body { padding: 24px; }
    .card-header { padding: 18px 24px; }
  }

  /* Large screens >= 1440px */
  @media (min-width: 1440px) {
    .page { max-width: 1000px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="page-header">
    <h1>Account <span>Settings</span></h1>
    <p>Update your credentials below</p>
  </div>

  <!-- Cards wrapper — becomes 2-col grid on tablet+ -->
  <div class="cards-row">

    <!-- Email Card -->
    <div class="card">
      <div class="card-header">
        <div class="card-icon">
          <svg viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <div>
          <div class="card-title">Email Address</div>
          <div class="card-subtitle">Enter new email and confirm it</div>
        </div>
      </div>
      <div class="card-body">
        <div class="form-group">
          <label for="new-email">New Email</label>
          <input type="email" id="new-email" placeholder="new@email.com" autocomplete="off"/>
          <div class="field-msg" id="msg-new-email"></div>
        </div>
        <div class="form-group">
          <label for="confirm-email">Confirm Email</label>
          <input type="email" id="confirm-email" placeholder="Repeat new email" autocomplete="off"/>
          <div class="field-msg" id="msg-confirm-email"></div>
        </div>
        <div class="form-group">
          <label for="email-password">Current Password</label>
          <div class="input-wrap">
            <input type="password" id="email-password" placeholder="Confirm with your password" autocomplete="current-password"/>
            <button class="toggle-pw" data-target="email-password" aria-label="Toggle visibility">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="field-msg" id="msg-email-password"></div>
        </div>
        <button class="btn" id="btn-email" disabled>
          <span class="btn-label">Update Email</span>
          <div class="spinner"></div>
        </button>
      </div>
    </div>

    <!-- Password Card -->
    <div class="card">
      <div class="card-header">
        <div class="card-icon">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </div>
        <div>
          <div class="card-title">Password</div>
          <div class="card-subtitle">Current password + choose a new one</div>
        </div>
      </div>
      <div class="card-body">
        <div class="form-group">
          <label for="current-pw">Current Password</label>
          <div class="input-wrap">
            <input type="password" id="current-pw" placeholder="Your current password" autocomplete="current-password"/>
            <button class="toggle-pw" data-target="current-pw" aria-label="Toggle visibility">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="field-msg" id="msg-current-pw"></div>
        </div>
        <div class="form-group">
          <label for="new-pw">New Password</label>
          <div class="input-wrap">
            <input type="password" id="new-pw" placeholder="Min. 8 characters" autocomplete="new-password"/>
            <button class="toggle-pw" data-target="new-pw" aria-label="Toggle visibility">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="strength-row">
            <div class="seg" id="s1"></div>
            <div class="seg" id="s2"></div>
            <div class="seg" id="s3"></div>
            <div class="seg" id="s4"></div>
          </div>
          <div class="field-msg" id="msg-new-pw"></div>
        </div>
        <div class="form-group">
          <label for="confirm-pw">Confirm New Password</label>
          <div class="input-wrap">
            <input type="password" id="confirm-pw" placeholder="Repeat new password" autocomplete="new-password"/>
            <button class="toggle-pw" data-target="confirm-pw" aria-label="Toggle visibility">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="field-msg" id="msg-confirm-pw"></div>
        </div>
        <button class="btn" id="btn-pw" disabled>
          <span class="btn-label">Update Password</span>
          <div class="spinner"></div>
        </button>
      </div>
    </div>

  </div><!-- /cards-row -->
</div><!-- /page -->

<div class="toast" id="toast"></div>

<script type="module" src="../js/settings.js"></script>
</body>
</html>
