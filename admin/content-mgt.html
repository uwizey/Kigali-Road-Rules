<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Builder</title>
  <link rel="icon" href="../assets/logo.png" type="image/png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
   <link rel="stylesheet" href="../css/admin/content-mgt.css">
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════════════════════ -->
<header class="header">
  <a class="header-logo" href="admin.html">
    <i class="fas fa-layer-group"></i>
    Admin Panel
  </a>

  <div id="headerBreadcrumb" class="header-breadcrumb" data-sub=""></div>

  <span class="save-indicator" id="saveIndicator">
    <i class="fas fa-check-circle"></i> Saved
  </span>

  <nav class="header-nav">
    <a href="analytic.html">Analytics</a>
    <a href="subscription.html">Subscription</a>
    <a href="content-mgt.html" class="active">Content</a>
    <a href="#" class="btn-logout" id="btn-logout">Logout</a>
  </nav>
</header>

<!-- ═══ THREE-PANEL WORKSPACE ════════════════════════════════ -->
<div class="workspace">

  <!-- LEFT — Topics tree -->
  <aside class="panel-left">
    <div class="panel-head">
      <h3>Topics</h3>
    </div>
    <div class="panel-scroll">
      <div id="topicsTree"></div>
    </div>
  </aside>

  <!-- MIDDLE — Sections -->
  <aside class="panel-mid">
    <div class="panel-head">
      <div id="sectionsTopic" class="mid-topic-label">—</div>
    </div>
    <button class="btn-add-section" id="btnAddSection">
      <i class="fas fa-plus"></i> New Section
    </button>
    <div class="sections-scroll">
      <div id="sectionsList"></div>
    </div>
  </aside>

  <!-- RIGHT — Builder -->
  <main class="panel-right">

    <div class="builder-header" id="builderHeader">
      <span class="builder-section-name" id="builderSectionName">Section</span>
      <div class="builder-header-actions">
        <button class="btn-icon" id="btnCollapseAll">
          <i class="fas fa-compress-alt"></i> Collapse all
        </button>
      </div>
    </div>

    <div id="builderBody">
      <div class="empty-state">
        <div class="es-icon">🏗️</div>
        <h3>Section Builder</h3>
        <p>Select a subtopic on the left, then pick a section to start building.</p>
      </div>
    </div>

    <div class="builder-footer" id="builderFooter">
      <button class="btn-add-comp" id="btnOpenCompModal">
        <i class="fas fa-plus"></i> Add Component
      </button>
    </div>

  </main>
</div>

<!-- ═══ CONFIRM MODAL ════════════════════════════════════════ -->
<div id="modalConfirm" class="modal">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="confirmTitle">Confirm</h3>
      <button class="modal-close" data-close="modalConfirm">&#215;</button>
    </div>
    <div class="modal-body">
      <p id="confirmMsg"></p>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel-modal" data-close="modalConfirm">Cancel</button>
      <button class="btn-confirm-modal" id="confirmBtn">Confirm</button>
    </div>
  </div>
</div>

<script src="../js/admin/admin-content-script.js" type="module"></script>
</body>
</html>
